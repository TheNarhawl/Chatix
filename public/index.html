    <title>Chatix</title>

<body>
    <h1 class="title">Chatix</h1>
    <div class="main">
        <div class="name">
            <span><i class='bx bx-user-circle' ></i></span>
            <input type="text" id="name-input" class="name-input" value="user" maxlength="15">
            <span><i class='bx bx-user-pin'></i></span><h3 class="clients-total" id="clients-total">Clients: 2</h3>
        </div>
        <ul class="message-container" id="message-container">
            <li class="message-welcome">
                <p>
                    <span><img src="duck_animated.gif"></span>
                    Welcome to Chatix!
                </p>
            </li>
            <!-- <li class="message-left">
                <p class="message">

                </p>
            </li>
            <li class="message-right">
                <p class="message">
                    lorem impsum
                    <span>bluebird • 26 Jul 10:40</span>
                </p>
            </li> -->

            <!-- <li class="message-feedback">
                <p class="feedback" id="feedback">
                    killer is typing a message...
                </p>
            </li> -->

        <form class="message-form" id="message-form">
            <input type="text" name="message" id="message-input" class="message-input">
            <div class="v-divider"></div>
            <button type="submit" class="send-button"><span><i class='bx bxl-telegram'></i></span>
            </button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
